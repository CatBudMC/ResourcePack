name: 壓縮 zip、計算 SHA-1 並發佈到 Tag
on:
  push:
    branches:
    - master
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 簽出儲存庫
      uses: actions/checkout@v2
    - name: 壓縮成 zip
      run: zip -r resource.zip assets/* license.md pack.mcmeta
    - name: 計算 SHA1
      run: sha1sum resource.zip | awk '{print $1}' > resource.zip.sha1
    - name: 創建發佈
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        draft: false
        prerelease: false
    - name: 上傳 zip
      id: upload_zip
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./resource.zip
        asset_name: resource.zip
        asset_content_type: application/zip
    - name: 上傳 zip
      id: upload_zip_sha1
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./resource.zip.sha1
        asset_name: resource.zip.sha1
        asset_content_type: application/plain
